
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aussie Rights Kit — Know Your Rights Before You Need Them</title>
  <meta name="description" content="Free Australian legal rights app. Know exactly what police can and can't do in your state — before you need it." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(201,168,76,0.15);
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 10px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .logo-text span { color: #c9a84c; }

    .btn-small {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, #b8940e, #e8c444);
      color: #000;
      font-size: 13px;
      font-weight: 800;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      letter-spacing: 0.2px;
      transition: opacity 0.15s;
    }

    .btn-small:hover { opacity: 0.88; }

    /* ─── HERO ─── */
    .hero {
      text-align: center;
      padding: 76px 24px 56px;
      max-width: 740px;
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.45);
      color: #c9a84c;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(30px, 6vw, 52px);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -1.5px;
      margin-bottom: 20px;
      color: #fff;
    }

    h1 em {
      font-style: normal;
      background: linear-gradient(90deg, #c9a84c, #f0d060);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline-primary {
      font-size: clamp(15px, 2.2vw, 19px);
      color: #c9a84c;
      font-weight: 600;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .tagline-secondary {
      font-size: clamp(13px, 1.8vw, 16px);
      color: rgba(255,255,255,0.45);
      margin-bottom: 40px;
      letter-spacing: 0.2px;
    }

    .cta-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #b8940e, #e8c444, #c9a84c);
      color: #000;
      font-size: 16px;
      font-weight: 900;
      padding: 17px 38px;
      border-radius: 12px;
      text-decoration: none;
      letter-spacing: 0.1px;
      box-shadow: 0 6px 32px rgba(201,168,76,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(201,168,76,0.6);
    }

    .btn-web {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid rgba(201,168,76,0.35);
      color: #c9a84c;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 26px;
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .btn-web:hover {
      border-color: rgba(201,168,76,0.7);
      background: rgba(201,168,76,0.07);
    }

    .free-note {
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.3px;
    }

    /* ─── DIVIDER ─── */
    .gold-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
    }

    /* ─── SCALES SECTION ─── */
    .scales-section {
      text-align: center;
      padding: 64px 24px 60px;
      position: relative;
    }

    .scales-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .scales-inner {
      max-width: 520px;
      margin: 0 auto;
      position: relative;
    }

    .scales-logo {
      width: 200px;
      height: auto;
      /* Strip white background + recolour to gold */
      filter: invert(1) sepia(1) saturate(4) hue-rotate(5deg) brightness(0.92);
      mix-blend-mode: screen;
      margin-bottom: 24px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    .scales-slogan {
      font-size: clamp(20px, 3.5vw, 30px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.2;
      background: linear-gradient(90deg, #c9a84c, #f0d060, #c9a84c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── STATS ─── */
    .stats-wrap {
      border-top: 1px solid rgba(201,168,76,0.1);
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 48px;
      flex-wrap: wrap;
      padding: 52px 24px;
      max-width: 760px;
      margin: 0 auto;
    }

    .stat { text-align: center; }

    .stat-number {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #c9a84c, #f0d060);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }

    /* ─── FEATURES ─── */
    .features {
      max-width: 840px;
      margin: 0 auto;
      padding: 64px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 14px;
    }

    .feature-card {
      background: #0d0d0d;
      border: 1px solid rgba(201,168,76,0.12);
      border-radius: 14px;
      padding: 26px 22px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .feature-card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-3px);
    }

    .feature-icon { font-size: 26px; margin-bottom: 14px; }

    .feature-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .feature-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      line-height: 1.7;
    }

    /* ─── STATES ─── */
    .states {
      text-align: center;
      padding: 0 24px 72px;
    }

    .states h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .state-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: 480px;
      margin: 0 auto;
    }

    .pill {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.25);
      padding: 8px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 800;
      color: #c9a84c;
      letter-spacing: 0.8px;
      transition: background 0.15s, border-color 0.15s;
    }

    .pill:hover {
      background: rgba(201,168,76,0.08);
      border-color: rgba(201,168,76,0.5);
    }

    /* ─── BOTTOM CTA ─── */
    .bottom-cta {
      text-align: center;
      padding: 72px 24px 88px;
      background: linear-gradient(180deg, #0d0900 0%, #000 100%);
      border-top: 1px solid rgba(201,168,76,0.18);
      position: relative;
    }

    .bottom-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .cta-shield {
      width: 68px;
      height: 68px;
      object-fit: contain;
      border-radius: 14px;
      margin-bottom: 22px;
      position: relative;
    }

    .bottom-cta h2 {
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: -0.8px;
      position: relative;
    }

    .bottom-cta p {
      color: rgba(255,255,255,0.38);
      margin-bottom: 34px;
      font-size: 15px;
      position: relative;
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 22px;
      font-size: 12px;
      color: rgba(255,255,255,0.18);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    footer a {
      color: rgba(201,168,76,0.4);
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .stats { gap: 28px; }
      .scales-logo { width: 150px; }
      header { padding: 16px 18px; }
    }
  </style>
</head>
